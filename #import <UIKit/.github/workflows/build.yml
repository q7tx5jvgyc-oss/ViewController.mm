name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
          -scheme AutoTouchApp \
          -configuration Release \
          -sdk iphoneos \
          build

      - name: Archive build output
        uses: actions/upload-artifact@v4
        with:
          name: BuildOutput
          path: |
            build
