name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: List Schemes
        run: xcodebuild -list

      - name: Clean Build
        run: |
          xcodebuild clean \
          -scheme AutoTouchApp

      - name: Build App (Simulator safe)
        run: |
          xcodebuild \
          -scheme AutoTouchApp \
          -configuration Release \
          -sdk iphonesimulator \
          build

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/*
