name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Create project from files (manual compile)
        run: |
          mkdir build

          clang++ -fobjc-arc \
          -framework UIKit \
          -framework Foundation \
          main.mm \
          AppDelegate.mm \
          ViewController.mm \
          -o build/app

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build
